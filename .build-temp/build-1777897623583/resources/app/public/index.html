<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f0f0f">
  <meta name="description" content="Claudio — Personal AI Radio DJ">
  <link rel="manifest" href="/manifest.json">
  <title>Claudio</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="app">
    <!-- ── View: Player ── -->
    <div id="view-player" class="view active">
      <div class="player-artwork" id="artwork">
        <div class="artwork-placeholder">♪</div>
      </div>
      <div class="player-info">
        <div class="now-label">NOW PLAYING</div>
        <div class="track-title" id="track-title">等待 Claudio 唤醒…</div>
        <div class="track-reason" id="track-reason"></div>
      </div>
      <audio id="audio" preload="none"></audio>
      <div class="player-controls">
        <button id="btn-prev" disabled>&#x23EE;</button>
        <button id="btn-play" disabled>&#x25B6;</button>
        <button id="btn-next" disabled>&#x23ED;</button>
      </div>
      <div class="chat-bar">
        <input type="text" id="chat-input" placeholder="跟 Claudio 说点什么…" autocomplete="off">
        <button id="btn-send">发送</button>
      </div>
      <div class="dj-message" id="dj-message"></div>
    </div>

    <!-- ── View: Profile ── -->
    <div id="view-profile" class="view">
      <h3>你的音乐画像</h3>
      <div id="profile-content">加载中…</div>
    </div>

    <!-- ── View: Settings ── -->
    <div id="view-settings" class="view">
      <h3>设置</h3>
      <div class="settings-section">
        <div class="setting-card">
          <label class="setting-label" for="model-select">🧠 AI 模型</label>
          <select id="model-select" class="model-select"></select>
          <span class="model-hint" id="model-hint"></span>
        </div>
        <div class="setting-row">
          <span class="setting-label">DeepSeek</span>
          <span class="setting-status" id="status-deepseek">--</span>
        </div>
        <div class="setting-row">
          <span class="setting-label">网易云 API</span>
          <span class="setting-status" id="status-netease">--</span>
        </div>
        <div class="setting-row">
          <span class="setting-label">Fish TTS</span>
          <span class="setting-status" id="status-fish">--</span>
        </div>
        <div class="setting-row">
          <span class="setting-label">调度器</span>
          <span class="setting-status" id="status-scheduler">--</span>
        </div>
        <div class="setting-row">
          <span class="setting-label">WebSocket</span>
          <span class="setting-status" id="status-ws">未连接</span>
        </div>
      </div>
    </div>

    <!-- ── Bottom Nav ── -->
    <nav class="bottom-nav">
      <button class="nav-btn active" data-view="player">♪ 播放</button>
      <button class="nav-btn" data-view="profile">👤 画像</button>
      <button class="nav-btn" data-view="settings">⚙ 设置</button>
    </nav>
  </div>

  <script src="/app.js"></script>
</body>
</html>
