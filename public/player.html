<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claudio</title>
  <link rel="stylesheet" href="player.css">
</head>
<body>

<div id="app">
  <!-- ── Title Bar ── -->
  <header id="titlebar">
    <span class="tb-title">Claudio</span>
    <div class="tb-controls">
      <button id="btn-min" title="最小化">—</button>
      <button id="btn-max" title="最大化">□</button>
      <button id="btn-close" title="关闭">✕</button>
    </div>
  </header>

  <!-- ── Album Art ── -->
  <div id="artwork-wrap">
    <div id="artwork" class="paused">
      <div class="art-inner"></div>
    </div>
    <div class="art-glow"></div>
  </div>

  <!-- ── Track Info ── -->
  <div id="track-info">
    <div class="track-title" id="track-title">Claudio</div>
    <div class="track-sub" id="track-sub">个人 AI 电台 — 随时待命</div>
  </div>

  <!-- ── DJ Message ── -->
  <div id="dj-msg" class="hidden">
    <p class="dj-say" id="dj-say"></p>
    <p class="dj-reason" id="dj-reason"></p>
  </div>

  <!-- ── Controls ── -->
  <div id="controls">
    <button id="btn-prev" class="ctrl-btn" disabled>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
    </button>
    <button id="btn-play" class="ctrl-btn play-btn" disabled>
      <svg id="icon-play" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><polygon points="8,5 19,12 8,19"/></svg>
      <svg id="icon-pause" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
    </button>
    <button id="btn-next" class="ctrl-btn" disabled>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
    </button>
  </div>

  <!-- ── Chat Input ── -->
  <div id="chat-bar">
    <input type="text" id="chat-input" placeholder="跟 Claudio 说点什么…" autocomplete="off" spellcheck="false">
    <button id="btn-send">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>
    </button>
  </div>

  <!-- ── Settings Overlay ── -->
  <div id="settings-overlay" class="hidden">
    <div class="settings-panel">
      <h3>设置</h3>
      <div class="setting-item">
        <label>AI 模型</label>
        <select id="model-select"></select>
      </div>
      <p class="model-note" id="model-note"></p>
      <button id="btn-settings-close" class="btn-close-panel">关闭</button>
    </div>
  </div>

  <!-- ── Settings gear ── -->
  <button id="btn-settings" class="gear-btn" title="设置">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>
</div>

<!-- Hidden audio element -->
<audio id="audio" preload="none"></audio>

<script src="player.js"></script>
</body>
</html>
