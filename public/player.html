<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claudio.fm</title>
  <link rel="stylesheet" href="player.css">
</head>
<body>

<div id="app">
  <!-- ═══ HEADER ═══ -->
  <header id="header">
    <span class="logo">Claudio</span>
    <div class="header-right">
      <button id="btn-theme" class="btn-ghost">DARK</button>
    </div>
  </header>

  <!-- ═══ CLOCK ═══ -->
  <section id="clock-area">
    <div class="clock-digital" id="clock-time">00:00</div>
    <div class="clock-date" id="clock-date">Sunday 00 JAN 0000</div>
    <div class="on-air">
      <span class="dot-pulse"></span> ON AIR
    </div>
  </section>

  <!-- ═══ PLAYER ═══ -->
  <section id="player-area">
    <div class="player-row">
      <div class="now-playing">
        <div class="np-title" id="np-title">—</div>
        <div class="np-artist" id="np-artist">—</div>
        <div class="np-label">PLAYING</div>
      </div>
      <div class="player-controls">
        <button id="btn-prev" class="ctrl-icon" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/>
          </svg>
        </button>
        <button id="btn-play" class="ctrl-icon play-main" disabled>
          <svg id="icon-play" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="8,5 19,12 8,19"/>
          </svg>
          <svg id="icon-pause" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="display:none">
            <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
          </svg>
        </button>
        <button id="btn-next" class="ctrl-icon" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/>
          </svg>
        </button>
      </div>
    </div>
    <!-- Progress bar -->
    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="progress-time">
        <span id="time-now">00:00</span>
        <span id="time-total">00:00</span>
      </div>
    </div>
  </section>

  <!-- ═══ QUEUE ═══ -->
  <section id="queue-area">
    <div class="section-head">
      <span class="section-title">QUEUE</span>
      <span class="section-count" id="queue-count">0 TRACKS</span>
    </div>
    <div class="queue-list" id="queue-list">
      <div class="queue-empty">— 队列为空 —</div>
    </div>
  </section>

  <!-- ═══ AI AREA ═══ -->
  <section id="ai-area">
    <div class="section-head">
      <span class="ai-badge">
        <span class="dot-pulse green"></span> Claudio
      </span>
    </div>
    <div class="ai-card">
      <div class="ai-avatar" id="ai-avatar">♪</div>
      <div class="ai-bubble">
        <p class="ai-text-en" id="ai-en"></p>
        <p class="ai-text-zh" id="ai-zh"></p>
        <div class="ai-status" id="ai-status">
          <span id="ai-time">--:--</span>
          <span class="dot-pulse green sm"></span> PLAYING
        </div>
      </div>
    </div>
  </section>

  <!-- ═══ INPUT ═══ -->
  <section id="input-area">
    <div class="input-glow">
      <input type="text" id="chat-input" placeholder="Say something to Claudio..." autocomplete="off" spellcheck="false">
      <button id="btn-mic" class="input-action" title="语音">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <button id="btn-send" class="input-action primary" title="发送">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/>
        </svg>
      </button>
    </div>
  </section>

  <!-- ═══ FOOTER ═══ -->
  <footer id="footer">
    <span class="footer-brand">CLAUDIO.FM</span>
    <span class="footer-status">
      <span class="dot-static"></span> CONNECTED
    </span>
  </footer>

  <!-- ═══ SETTINGS OVERLAY ═══ -->
  <div id="settings-overlay" class="hidden">
    <div class="settings-panel">
      <h3>— SETTINGS —</h3>
      <div class="setting-item">
        <label>MODEL</label>
        <select id="model-select"></select>
      </div>
      <p class="model-note" id="model-note"></p>
      <button id="btn-settings-close" class="btn-close-panel">CLOSE</button>
    </div>
  </div>

  <!-- Window controls overlay (top-right) -->
  <div id="win-controls">
    <button id="btn-min" title="Minimize">—</button>
    <button id="btn-max" title="Maximize">□</button>
    <button id="btn-close" title="Close">✕</button>
  </div>

  <!-- Settings gear -->
  <button id="btn-settings" class="gear-btn" title="Settings">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>
</div>

<audio id="audio" preload="none"></audio>
<script src="player.js"></script>
</body>
</html>
