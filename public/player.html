<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claudio.fm</title>
  <link rel="stylesheet" href="player.css">
</head>
<body>

<!-- ═══ LOGIN OVERLAY ═══ -->
<div id="login-overlay" class="hidden">
  <div class="login-win-controls">
    <button id="login-btn-min" title="最小化">—</button>
    <button id="login-btn-close" title="关闭">✕</button>
  </div>
  <div class="login-card">
    <div class="login-logo">Claudio</div>
    <p class="login-desc">Personal AI Radio DJ</p>
    <input type="text" id="login-uid" class="login-input" placeholder="输入网易云用户 ID" autocomplete="off">
    <button id="btn-login" class="login-btn">导入我的歌单</button>
    <div class="login-actions">
      <button id="btn-login-skip" class="login-skip-btn">跳过，直接进入</button>
      <button id="btn-login-guide" class="login-guide-btn">? 如何获取 UID</button>
    </div>
    <p class="login-note" id="login-note"></p>
    <div class="login-guide-tip" id="login-guide-tip" style="display:none">
      打开网易云 → 我的 → 头像 → 分享 → 复制链接 →<br>链接末尾 <b>id=</b> 后面的数字就是你的 UID
    </div>
  </div>
</div>

<div id="app">
  <!-- ═══ HEADER ═══ -->
  <header id="header">
    <span class="logo">Claudio</span>
    <div class="header-right">
      <button id="btn-theme" class="btn-ghost">DARK</button>
      <button id="btn-lang" class="btn-ghost">中文</button>
      <button id="btn-settings" class="btn-ghost" title="Settings">SET</button>
      <span class="win-dots">
        <button id="btn-min" title="Minimize">—</button>
        <button id="btn-max" title="Maximize">□</button>
        <button id="btn-close" title="Close">✕</button>
      </span>
    </div>
  </header>

  <!-- ═══ CLOCK ═══ -->
  <section id="clock-area">
    <div class="clock-digital" id="clock-time">00:00</div>
    <div class="clock-date" id="clock-date">Sunday 00 JAN 0000</div>
    <div class="on-air">
      <span class="dot-pulse"></span> <span data-i18n="onAir">ON AIR</span>
    </div>
  </section>

  <!-- ═══ PLAYER ═══ -->
  <section id="player-area">
    <div class="player-row">
      <div class="now-playing">
        <div class="np-title" id="np-title">—</div>
        <div class="np-artist" id="np-artist">—</div>
        <div class="np-label" id="np-label">
          <span class="np-spectrum"><span class="s-bar"></span><span class="s-bar"></span><span class="s-bar"></span><span class="s-bar"></span></span>
          <span id="np-label-text">IDLE</span>
        </div>
      </div>
      <div class="player-controls">
        <button id="btn-prev" class="ctrl-icon" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/>
          </svg>
        </button>
        <button id="btn-play" class="ctrl-icon play-main" disabled>
          <svg id="icon-play" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="8,5 19,12 8,19"/>
          </svg>
          <svg id="icon-pause" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="display:none">
            <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
          </svg>
        </button>
        <button id="btn-next" class="ctrl-icon" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/>
          </svg>
        </button>
        <button id="btn-fav" class="ctrl-icon fav-icon" title="收藏">
          <svg id="icon-fav" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </button>
      </div>
    </div>
    <!-- Progress bar -->
    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-hover-time" id="hover-time"></div>
      <div class="progress-track" id="progress-track">
        <div class="progress-buffered" id="progress-buffered"></div>
        <div class="progress-fill" id="progress-fill"></div>
        <div class="progress-thumb" id="progress-thumb"></div>
      </div>
      <div class="progress-time">
        <span id="time-now">00:00</span>
        <span id="time-total">00:00</span>
      </div>
    </div>
    <!-- Volume -->
    <div class="volume-wrap">
      <span class="vol-icon">—</span>
      <input type="range" id="volume-slider" class="volume-slider" min="0" max="100" value="80">
      <span class="vol-icon">+</span>
    </div>
  </section>

  <!-- ═══ MIDDLE WRAP (Queue + AI share flex space) ═══ -->
  <div class="middle-wrap">

  <!-- ═══ QUEUE ═══ -->
  <section id="queue-area">
    <div class="section-head">
      <span class="section-title">QUEUE</span>
      <span class="section-count" id="queue-count">0 TRACKS</span>
    </div>
    <div class="queue-list" id="queue-list">
      <div class="queue-empty">— 队列为空 —</div>
    </div>
    <div class="history-list" id="history-list"></div>
    <div class="favs-list" id="favs-list"></div>
  </section>

  <!-- ═══ AI AREA ═══ -->
  <section id="ai-area">
    <div class="section-head">
      <span class="ai-badge">
        <span class="dot-pulse green"></span> <span data-i18n="aiBadge">Claudio</span>
      </span>
      <span class="waveform" id="ai-waveform">
        <span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span>
      </span>
    </div>
    <div class="ai-chat" id="ai-chat">
      <!-- JS-rendered chat history -->
    </div>
  </section>

  </div><!-- /middle-wrap -->

  <!-- ═══ INPUT ═══ -->
  <section id="input-area">
    <div class="input-glow">
      <input type="text" id="chat-input" placeholder="Say something to Claudio..." autocomplete="off" spellcheck="false">
      <button id="btn-mic" class="input-action" title="语音">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <button id="btn-send" class="input-action primary" title="发送">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/>
        </svg>
      </button>
    </div>
  </section>

  <!-- ═══ FOOTER ═══ -->
  <footer id="footer">
    <span class="footer-brand">CLAUDIO.FM</span>
    <span class="footer-status">
      <span class="dot-static"></span> <span data-i18n="footerConnected">CONNECTED</span>
    </span>
  </footer>

  <!-- ═══ FAVORITES SIDE DRAWER ═══ -->
  <div id="favs-drawer" class="hidden">
    <div class="favs-backdrop"></div>
    <div class="favs-panel">
      <div class="favs-panel-head">
        <span>❤️ FAVORITES</span>
        <button id="favs-close" class="favs-close-btn">✕</button>
      </div>
      <div class="favs-panel-list" id="favs-panel-list"></div>
    </div>
  </div>

  <!-- ═══ SETTINGS OVERLAY ═══ -->
  <div id="settings-overlay" class="hidden">
    <div class="settings-panel">
      <h3>— SETTINGS —</h3>

      <!-- API Key -->
      <div class="setting-section">
        <div class="section-label">API KEY</div>
        <input type="password" id="api-key-input" placeholder="sk-..." class="setting-input">
        <button id="btn-save-key" class="btn-import">SAVE KEY</button>
        <p class="setting-note" id="api-key-note"></p>
      </div>

      <div class="setting-divider"></div>

      <!-- Model -->
      <div class="setting-section">
        <div class="section-label">MODEL</div>
        <select id="model-select"></select>
        <p class="setting-note" id="model-note"></p>
      </div>

      <div class="setting-divider"></div>

      <!-- Netease Import -->
      <div class="setting-section">
        <div class="section-label">NETEASE IMPORT</div>
        <div class="api-status-row">
          <span class="api-dot" id="api-dot"></span>
          <span class="api-status-text" id="api-status-text">API: checking...</span>
        </div>
        <input type="text" id="import-input" placeholder="NetEase UID or playlist link" class="setting-input">
        <button id="btn-import" class="btn-import">IMPORT PLAYLISTS</button>
        <p class="setting-note" id="import-status"></p>
      </div>

      <button id="btn-settings-close" class="btn-close-panel">CLOSE</button>
    </div>
  </div>

</div>

<audio id="audio" preload="none"></audio>
<script src="player.js"></script>
</body>
</html>
